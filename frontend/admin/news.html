<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻管理 - 管理后台</title>
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .search-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
    .search-bar input, .search-bar select { padding:6px 10px; border-radius:6px; border:1px solid #334155; background:#1e293b; color:#e2e8f0; font-size:13px; }
    .search-bar input { width:200px; }
    .search-bar select { width:140px; }
  </style>
</head>
<body>
  <aside class="admin-sidebar">
    <div class="sidebar-logo">🐱 猫友圈管理</div>
    <nav class="sidebar-menu">
      <a href="/admin/index.html">📊 概览</a>
      <a href="/admin/cats.html">🐱 猫咪审核</a>
      <a href="/admin/news.html" class="active">📰 新闻管理</a>
      <a href="/admin/comments.html">💬 评论管理</a>
      <a href="/admin/users.html">👥 用户管理</a>
      <a href="/index.html">🏠 前台首页</a>
      <a href="#" onclick="Auth.logout()">🚪 退出登录</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-header">
      <h1>📰 新闻管理</h1>
      <button class="btn-add" onclick="openModal()">+ 发布新闻</button>
    </div>

    <!-- 条件查询 -->
    <div class="search-bar">
      <input type="text" id="searchTitle" placeholder="按标题查询">
      <select id="searchCategory">
        <option value="">全部分类</option>
        <option value="KNOWLEDGE">科普知识</option>
        <option value="ANNOUNCEMENT">公告通知</option>
        <option value="MIGRATION">迁入迁出</option>
      </select>
      <button class="btn-approve" onclick="search()" style="padding:6px 16px">查询</button>
      <button class="btn-reject" onclick="resetSearch()" style="padding:6px 16px">重置</button>
    </div>

    <table class="admin-table">
      <thead><tr><th>ID</th><th>标题</th><th>分类</th><th>发布时间</th><th>操作</th></tr></thead>
      <tbody id="newsTable"><tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">加载中...</td></tr></tbody>
    </table>
    <div id="pagination" style="margin-top:16px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap"></div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">发布新闻</h3>
      <input type="hidden" id="editId">
      <div class="form-group"><label>标题 *</label><input type="text" id="newsTitle" placeholder="新闻标题"></div>
      <div class="form-group">
        <label>分类 *</label>
        <select id="newsCategory">
          <option value="KNOWLEDGE">科普知识</option>
          <option value="ANNOUNCEMENT">公告通知</option>
          <option value="MIGRATION">迁入迁出</option>
        </select>
      </div>
      <div class="form-group"><label>封面图URL</label><input type="text" id="newsCover" placeholder="可选"></div>
      <div class="form-group"><label>内容 *</label><textarea id="newsContent" rows="6" placeholder="新闻内容..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-add" onclick="saveNews()">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script>
    Auth.requireAdmin();
    const categoryMap = { KNOWLEDGE: '科普', ANNOUNCEMENT: '公告', MIGRATION: '迁入迁出' };

    let currentPage = 1;
    let searchTitle = '';
    let searchCategory = '';

    function search() {
      searchTitle = document.getElementById('searchTitle').value.trim();
      searchCategory = document.getElementById('searchCategory').value;
      load(1);
    }

    function resetSearch() {
      document.getElementById('searchTitle').value = '';
      document.getElementById('searchCategory').value = '';
      searchTitle = ''; searchCategory = '';
      load(1);
    }

    async function load(page) {
      currentPage = page || 1;
      try {
        const result = await api.getAdminNews(currentPage, searchTitle, searchCategory);
        const tbody = document.getElementById('newsTable');
        if (!result.records || result.records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">暂无新闻</td></tr>';
        } else {
          tbody.innerHTML = result.records.map(n => `
            <tr>
              <td>${n.id}</td>
              <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.title}</td>
              <td>${categoryMap[n.category] || n.category}</td>
              <td>${new Date(n.createdAt).toLocaleDateString()}</td>
              <td>
                <button class="btn-edit" onclick='editNews(${JSON.stringify(n)})'>编辑</button>
                <button class="btn-delete" onclick="deleteNews(${n.id})">删除</button>
              </td>
            </tr>`).join('');
        }
        renderPagination(result.total, result.size);
      } catch(e) { showToast('加载失败', 'error'); }
    }

    function renderPagination(total, size) {
      const totalPages = Math.ceil(total / size);
      const pg = document.getElementById('pagination');
      pg.innerHTML = '';
      if (totalPages <= 1) return;

      const delta = 2;
      const pages = new Set([1, totalPages]);
      for (let i = currentPage - delta; i <= currentPage + delta; i++) {
        if (i >= 1 && i <= totalPages) pages.add(i);
      }
      const sorted = [...pages].sort((a, b) => a - b);

      const addBtn = (label, page, active, disabled) => {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.style.cssText = `padding:6px 12px;border-radius:6px;cursor:${disabled?'default':'pointer'};font-size:13px;min-width:36px;border:1px solid ${active?'#38bdf8':'#334155'};background:${active?'#38bdf8':'#1e293b'};color:${active?'#0f172a':disabled?'#475569':'#e2e8f0'};`;
        if (page && !disabled) btn.onclick = () => load(page);
        else btn.disabled = true;
        pg.appendChild(btn);
      };

      addBtn('«', 1, false, currentPage === 1);
      addBtn('‹', currentPage - 1, false, currentPage === 1);

      let prev = 0;
      for (const p of sorted) {
        if (p - prev > 1) {
          const span = document.createElement('span');
          span.textContent = '…';
          span.style.cssText = 'color:#475569;padding:0 4px;line-height:2';
          pg.appendChild(span);
        }
        addBtn(p, p, p === currentPage, false);
        prev = p;
      }

      addBtn('›', currentPage + 1, false, currentPage === totalPages);
      addBtn('»', totalPages, false, currentPage === totalPages);

      const info = document.createElement('span');
      info.textContent = `${currentPage}/${totalPages} 页，共 ${total} 条`;
      info.style.cssText = 'color:#64748b;font-size:12px;margin-left:8px;white-space:nowrap';
      pg.appendChild(info);
    }

    function openModal() {
      document.getElementById('modalTitle').textContent = '发布新闻';
      document.getElementById('editId').value = '';
      document.getElementById('newsTitle').value = '';
      document.getElementById('newsCategory').value = 'KNOWLEDGE';
      document.getElementById('newsCover').value = '';
      document.getElementById('newsContent').value = '';
      document.getElementById('modalOverlay').classList.add('show');
    }

    function editNews(n) {
      document.getElementById('modalTitle').textContent = '编辑新闻';
      document.getElementById('editId').value = n.id;
      document.getElementById('newsTitle').value = n.title;
      document.getElementById('newsCategory').value = n.category;
      document.getElementById('newsCover').value = n.coverUrl || '';
      document.getElementById('newsContent').value = n.content;
      document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }

    async function saveNews() {
      const title = document.getElementById('newsTitle').value.trim();
      const content = document.getElementById('newsContent').value.trim();
      const category = document.getElementById('newsCategory').value;
      const coverUrl = document.getElementById('newsCover').value.trim();
      const editId = document.getElementById('editId').value;
      if (!title || !content) return showToast('标题和内容必填', 'error');
      try {
        if (editId) {
          await api.updateNews(editId, { title, content, category, coverUrl });
          showToast('更新成功');
        } else {
          await api.createNews({ title, content, category, coverUrl });
          showToast('发布成功');
        }
        closeModal();
        load(currentPage);
      } catch(e) { showToast(e.message, 'error'); }
    }

    async function deleteNews(id) {
      if (!confirm('确认删除这篇新闻？')) return;
      try {
        await api.deleteNews(id);
        showToast('已删除');
        load(currentPage);
      } catch(e) { showToast(e.message, 'error'); }
    }

    function showToast(msg, type='success') {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    load(1);
  </script>
</body>
</html>
