# ⚠️ 组员克隆后需修改以下两处绝对路径为本机实际路径：
#   1. root   改为你的 frontend 目录路径
#   2. alias  改为你的 backend/uploads 目录路径
# 将此文件内容复制到你 Nginx 安装目录的 conf/nginx.conf 中使用

server {
    listen 80;
    server_name localhost;

    # 前端静态文件（⚠️ 修改为你本机的实际路径）
    location / {
        root C:/Users/Administrator/Desktop/demo/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理（端口需与 application.yml 中的 server.port 一致）
    location /api/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 图片上传文件访问（⚠️ 修改为你本机的实际路径）
    location /uploads/ {
        alias C:/Users/Administrator/Desktop/demo/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
