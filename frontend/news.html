<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻 - 猫友圈</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="main-nav"></div>
  <div class="container">
    <div class="news-tabs">
      <button class="news-tab active" onclick="switchTab(this, '')">全部</button>
      <button class="news-tab" onclick="switchTab(this, 'KNOWLEDGE')">🔬 科普知识</button>
      <button class="news-tab" onclick="switchTab(this, 'ANNOUNCEMENT')">📢 公告通知</button>
      <button class="news-tab" onclick="switchTab(this, 'MIGRATION')">🚀 迁入迁出</button>
    </div>
    <div id="newsList"><p class="empty">加载中...</p></div>
    <div id="pagination"></div>
  </div>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script>
    let currentCategory = '';
    const categoryMap = { KNOWLEDGE: '科普', ANNOUNCEMENT: '公告', MIGRATION: '迁入迁出' };

    function switchTab(btn, category) {
      document.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = category;
      loadNews(1);
    }

    async function loadNews(page) {
      const params = { page, size: 10 };
      if (currentCategory) params.category = currentCategory;
      try {
        const result = await api.getNews(params);
        const list = document.getElementById('newsList');
        if (!result.records || result.records.length === 0) {
          list.innerHTML = '<p class="empty">暂无新闻</p>';
        } else {
          list.innerHTML = result.records.map(n => `
            <a class="news-item" href="/news-detail.html?id=${n.id}">
              ${n.coverUrl ? `<img class="news-cover" src="${n.coverUrl}" alt="">` : '<div class="news-cover" style="display:flex;align-items:center;justify-content:center;font-size:28px">📰</div>'}
              <div>
                <div class="news-title">${n.title}</div>
                <div class="news-meta">
                  <span class="news-category-badge badge-${n.category}">${categoryMap[n.category] || n.category}</span>
                  &nbsp;${new Date(n.createdAt).toLocaleDateString()}
                </div>
              </div>
            </a>`).join('');
        }
        renderPagination(document.getElementById('pagination'), result.current, result.pages, 'loadNews');
      } catch(e) {
        document.getElementById('newsList').innerHTML = '<p class="empty">加载失败，请刷新重试</p>';
      }
    }

    loadNews(1);
  </script>
</body>
</html>
