# ⚠️ 组员克隆后需修改：
#   1. password 改为你本机的 MySQL 密码
#   2. server.port 如与其他服务冲突可自行修改（默认 8088）
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/maoyouquan?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: maoyouquan-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

upload:
  dir: ./uploads/

server:
  port: 8090
