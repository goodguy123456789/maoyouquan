<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻详情 - 猫友圈</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="main-nav"></div>
  <div class="container">
    <div class="news-detail" id="newsDetail"><p class="empty">加载中...</p></div>
  </div>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/common.js"></script>
  <script>
    const newsId = new URLSearchParams(location.search).get('id');
    const categoryMap = { KNOWLEDGE: '科普知识', ANNOUNCEMENT: '公告通知', MIGRATION: '迁入迁出' };

    async function load() {
      try {
        const n = await api.getNewsDetail(newsId);
        document.title = n.title + ' - 猫友圈';
        document.getElementById('newsDetail').innerHTML = `
          ${n.coverUrl ? `<img src="${n.coverUrl}" style="width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:20px" alt="">` : ''}
          <h1>${n.title}</h1>
          <div class="news-meta" style="margin:12px 0 24px">
            <span class="news-category-badge badge-${n.category}">${categoryMap[n.category] || n.category}</span>
            &nbsp;发布于 ${new Date(n.createdAt).toLocaleString()}
          </div>
          <div class="content">${n.content}</div>
          <div style="margin-top:24px">
            <a href="/news.html" style="color:#f97316;font-size:14px">← 返回新闻列表</a>
          </div>`;
      } catch(e) {
        document.getElementById('newsDetail').innerHTML = '<p class="empty">新闻不存在</p>';
      }
    }

    load();
  </script>
</body>
</html>
